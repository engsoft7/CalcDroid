name: Release

# Ao criar uma tag v* (ex.: v1.0), compila o APK de release e anexa o
# arquivo na Release do GitHub para download. Também pode ser disparado
# manualmente (aba Actions > Release > Run workflow) informando a tag,
# que é criada junto com a release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex.: v1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4

      # O keystore fica criptografado no repositório em
      # .github/calcdroid-upload.jks.enc (AES-256) e é descriptografado com
      # os secrets do repositório (Settings > Secrets and variables > Actions):
      #   KEYSTORE_PASSWORD - senha do keystore (também descriptografa o .enc)
      #   KEY_ALIAS         - alias da chave (ex.: calcdroid-upload)
      #   KEY_PASSWORD      - senha da chave
      # Sem os secrets, o APK é gerado sem assinatura (não instalável).
      - name: Restaurar keystore de assinatura
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::warning::Secrets do keystore ausentes; o APK sairá sem assinatura."
            exit 0
          fi
          if ! openssl enc -d -aes-256-cbc -pbkdf2 \
              -in .github/calcdroid-upload.jks.enc -out calcdroid-upload.jks \
              -pass env:KEYSTORE_PASSWORD; then
            echo "::error::Falha ao descriptografar o keystore; confira o secret KEYSTORE_PASSWORD."
            exit 1
          fi
          # Falha cedo, com mensagem clara, se o keystore ou as senhas estiverem errados.
          if ! keytool -list -keystore calcdroid-upload.jks \
              -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null; then
            echo "::error::Keystore ou senhas inválidos; confira os secrets KEYSTORE_*."
            exit 1
          fi
          cat > keystore.properties <<EOF
          storeFile=calcdroid-upload.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Compilar APK de release
        run: ./gradlew assembleRelease

      - name: Preparar artefato
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          APK=$(ls app/build/outputs/apk/release/app-release*.apk | head -n1)
          cp "$APK" "CalcDroid-${RELEASE_TAG}.apk"

      - name: Publicar na Release do GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: CalcDroid-*.apk
          generate_release_notes: true
